openapi: 3.1.0
info:
  title: Agricultural federation API
  description: |
    # Versioning
    This API uses semantic versioning (MAJOR.MINOR.PATCH). Available versions are : 
    - v0.0.1 (2026-04-21) : POST /collectivities for collectivities creation and POST /members for members creation.
    - v0.0.2 (2026-04-22) : Ajout de l'attribution d'un numéro et d'un nom unique à une collectivité (fonctionnalité J).
  version: 0.0.2
servers:
  - url: 'https://localhost:8080'
paths:
  '/collectivities':
    post:
    # ... (inchangé, garde le contenu original)
  '/members':
    post:
    # ... (inchangé)
  # NOUVEAU ENDPOINT POUR LA FONCTIONNALITÉ J
  '/collectivities/{id}/identifiers':
    put:
      summary: Attribuer un numéro et un nom unique à une collectivité
      description: |
        La fédération attribue un numéro unique et un nom unique à une collectivité.
        Une fois attribués, ils ne peuvent plus être modifiés.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Identifiant de la collectivité (au format UUID ou chaîne)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - numero
                - nom
              properties:
                numero:
                  type: string
                  description: Numéro unique de la collectivité
                nom:
                  type: string
                  description: Nom unique de la collectivité
      responses:
        '200':
          description: Identifiants attribués avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityStructure'
        '400':
          description: Requête invalide (données manquantes ou mal formées)
        '404':
          description: Collectivité non trouvée
        '409':
          description: Le numéro ou le nom existe déjà
        '422':
          description: Tentative de modification d'identifiants déjà attribués
components:
  schemas:
    # On ajoute 'numero' et 'nom' dans Collectivity
    CollectivityStructure:
      type: object
      properties:
        id:
          type: string
        location:
          type: string
        structure:
          $ref: '#/components/schemas/CollectivityStructure'
    Member:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            $ref: '#/components/schemas/Member'
    numero:                 # <-- NOUVEAU
          type: string
          description: Numéro unique attribué par la fédération
    nom:                    # <-- NOUVEAU
          type: string
          description: Nom unique attribué par la fédération
    # Le reste des schémas (CreateCollectivity, Member, etc.) reste identique